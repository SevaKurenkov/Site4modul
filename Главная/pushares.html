  <!-- Каталог -->

    <div class="catalog-content">

      <aside class="catalog-sidebar">
  <div class="filter-group">

    <div class="filter-sub">
      <div class="filter-item"><span class="filter-dot active"></span><button>Семена</button></div>
      <div class="filter-item"><span class="filter-dot"></span><button>Инструменты</button></div>
      <div class="filter-item"><span class="filter-dot"></span><button>Агрохимикаты</button></div>
    </div>
  </div>

  <div class="filter-group">
    <button class="filter-main">Цель</button>
    <div class="filter-sub">
      <div class="filter-item"><span class="filter-dot"></span><button>Посев</button></div>
      <div class="filter-item"><span class="filter-dot active"></span><button>Пересадка</button></div>
      <div class="filter-item"><span class="filter-dot"></span><button>Уход</button></div>
    </div>
  </div>

  <div class="filter-group">
    <button class="filter-main">Тип растения</button>
    <div class="filter-sub">
      <div class="filter-item"><span class="filter-dot"></span><button>Плодовые</button></div>
      <div class="filter-item"><span class="filter-dot active"></span><button>Декоративные</button></div>
      <div class="filter-item"><span class="filter-dot"></span><button>Травы</button></div>
    </div>
  </div>

  <div class="filter-group">
    <button class="filter-main">Условия</button>
    <div class="filter-sub">
      <div class="filter-item"><span class="filter-dot active"></span><button>Дома</button></div>
      <div class="filter-item"><span class="filter-dot"></span><button>В теплице</button></div>
      <div class="filter-item"><span class="filter-dot"></span><button>На поле</button></div>
    </div>
  </div>

  <div class="filter-group">
    <button class="filter-main">Методы роста</button>
    <div class="filter-sub">
      <div class="filter-item"><span class="filter-dot"></span><button>Гидропоника</button></div>
      <div class="filter-item"><span class="filter-dot active"></span><button>Традиционные</button></div>
      <div class="filter-item"><span class="filter-dot"></span><button>Органические</button></div>
    </div>
  </div>
</aside>


      <!-- Правая часть -->
      <div class="catalog-main">
        <div class="search-bar">
          <input type="text" placeholder="Поиск" class="search-input" data-js="search">
        </div>

        <div class="catalog-grid">
          <div class="catalog-card" data-js="card"></div>
          <div class="catalog-card" data-js="card"></div>
          <div class="catalog-card" data-js="card"></div>
          <div class="catalog-card" data-js="card"></div>
          <div class="catalog-card" data-js="card"></div>
          <div class="catalog-card" data-js="card"></div>
          <div class="catalog-card" data-js="card"></div>
          <div class="catalog-card" data-js="card"></div>
          <div class="catalog-card" data-js="card"></div>
