<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="../styles/sales.css">
</head>
<body>

  <!-- Хеддер — без изменений -->
  <header class="navbar">
    <div class="logo">
      <a href="../index.html">
        <img src="../assets/images/логозел.png" alt="Everbloom">
      </a>
    </div>
<nav class="nav-links">
  <a href="Главная/aboutUs.html" class="nav-link text-main">О нас</a>

</nav>
    <button class="nav-button text-main" data-js="nav-button">Записаться на занятие →</button>
  </header>

<section class="sales-hero">
  <h1 class="hero-title">Скидки</h1>
</section>

<section class="sales-top">
  <button class="arrow left" data-js="arrow-left">‹</button>

  <div class="top-card" data-js="card">
    <img src="../assets/images/роза.png" class="top-img" alt="Роза">
  </div>

  <div class="top-card" data-js="card">
    <img src="../assets/images/букет.png" class="top-img" alt="Букет">
  </div>

  <button class="arrow right" data-js="arrow-right">›</button>
</section>

<section class="sales-grid">
  <div class="grid-card" data-js="item">
    <h2>Домашние растения</h2>
    <p class="percent">-15%</p>
    <p class="desc">На все растения с условием выращивания дома</p>
    <button class="round-btn" data-js="btn">Подробнее</button>
  </div>

  <div class="grid-card" data-js="item">
    <h2>Садовые инструменты</h2>
    <p class="percent">-25%</p>
    <p class="desc">На все садовые инструменты и одежду</p>
    <button class="round-btn" data-js="btn">Подробнее</button>
  </div>

  <div class="grid-card" data-js="item">
    <h2>Подарочные наборы</h2>
    <p class="percent">-10%</p>
    <p class="desc">На все подарочные наборы и сертификаты</p>
    <button class="round-btn" data-js="btn">Подробнее</button>
  </div>
</section>


<footer class="footer-section">
  <div class="footer-left">
    <img src="../assets/images/vk 1.png" alt="VK" class="footer-icon">
    <img src="../assets/images/telegram (1) 1.png" alt="Telegram" class="footer-icon">
    <img src="../assets/images/youtube.png" alt="YouTube" class="footer-icon">
  </div>

  <div class="footer-center">
    <img src="../assets/images/логобел.png" alt="Everbloom" class="footer-logo">
  </div>

  <div class="footer-right">
    <p class="footer-text">Все права защищены</p>
    <p class="footer-phone">+7 (900) 600-90-60</p>
  </div>
</footer>
